[package]
name = "js_runtime"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
boa_ast = "0.21.1"
boa_engine = { version = "0.21.1", features = ["intl_bundled"] }
boa_gc = "0.21.1"
boa_interner = "0.21.1"
boa_macros = "0.21.1"
boa_parser = "0.21.1"
boa_runtime = { version = "0.21.1", features = ["reqwest-blocking"] }
boa_string = "0.21.1"
encoding_rs = "0.8"
flutter_rust_bridge = "=2.13.0-beta.2"
http = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking"] }
# kossjs = { git = "https://github.com/KossJS/KossJS.git", version = "0.1.0-dev.8" }
scraper = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt"] }

[profile.release]
opt-level = 'z'
lto = true
strip = true
codegen-units = 1
panic = 'abort'
