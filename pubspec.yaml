name: rohos_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  harmonyos_ui:
    path: packages/harmonyos_ui
  js_runtime:
    path: packages/js_runtime
  flutter:
    sdk: flutter
  # cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  ffi: ^2.1.3
  # liquid_glass_renderer: ^0.2.0-dev.4
  motor: ^1.1.0
  flutter_hooks: ^0.21.3+1
