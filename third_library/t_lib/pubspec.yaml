name: t_lib
description: "A new Flutter FFI plugin project."
version: 0.0.1

environment:
  sdk: '>=3.3.1 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  flutter_rust_bridge: 2.13.0-beta.1
  freezed_annotation: ^3.1.0

dev_dependencies:
  build_runner: ^2.15.0
  ffi: ^2.1.0
  # ffigen: ^9.0.1
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5


flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
      ohos:
        ffiPlugin: true
